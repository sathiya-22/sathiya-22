name: Refresh Profile Stats

on:
  schedule:
    - cron: '0 6 * * *'  # Daily, 11:30 IST (06:00 UTC) — after all AutoScout cycles finish
  workflow_dispatch:        # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Refresh README stats
        run: python scripts/update_profile.py

      - name: Commit if changed
        run: |
          git config user.name  "AutoScout Bot"
          git config user.email "autoscout-bot@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet && echo "No change." || {
            git commit -m "chore: refresh profile stats $(date -u +%Y-%m-%d)"
            git push
          }
